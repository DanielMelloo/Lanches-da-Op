{% extends "base.html" %}

{% block title %}Cadastrar Senha - Lanches OP{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="glass-panel" style="padding: 40px; width: 100%; max-width: 400px; border-color: var(--accent-green);">
        <h2 style="text-align: center; margin-bottom: 10px; color: var(--accent-green);">Definir Senha</h2>
        <p class="text-muted text-center mb-lg" style="font-size: 0.9em;">
            Olá, <strong>{{ user.name }}</strong>! Como você foi promovido a administrador, precisa cadastrar uma senha para acessar o painel.
        </p>

        <form method="POST">
            <div class="form-group">
                <label for="password">Nova Senha</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" minlength="6" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmar Nova Senha</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repita a nova senha" minlength="6" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn-neon" style="width: 100%; margin-top: 10px; background: var(--accent-green); color: #000; box-shadow: 0 0 10px rgba(0, 200, 83, 0.3);">
                <i class="ph-bold ph-key"></i> Salvar Senha e Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
